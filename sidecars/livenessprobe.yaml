---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: liveness-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: liveness-demo
  template:
    metadata:
      labels:
        app: liveness-demo
    spec:
      containers:
      - name: app
        image: nginx
        ports:
        - containerPort: 80

        # 🔴 Liveness Probe ONLY
        livenessProbe:
          exec:
            command:
            - sh
            - -c
            - test -f /tmp/live
          initialDelaySeconds: 30   # VERY IMPORTANT
          periodSeconds: 5

---
apiVersion: v1
kind: Service
metadata:
  name: liveness-service
spec:
  type: NodePort
  selector:
    app: liveness-demo
  ports:
  - port: 80
    targetPort: 80
    